services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tokobangunan-app
    ports:
      - "7777:8080"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - DATABASE_URL=postgres://dev:dev@db:5432/tokobangunan?sslmode=disable
      - APP_ENV=development
      - APP_PORT=8080
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - SESSION_SECRET=dev-only-secret-do-not-use-in-prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tokobangunan-db
    ports:
      - "5544:5432"
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=tokobangunan
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d tokobangunan"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: tokobangunan-adminer
    ports:
      - "9876:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
      - ADMINER_DESIGN=hever
    depends_on:
      - db
    restart: unless-stopped

volumes:
  go-mod-cache:
  go-build-cache:
  pg-data:
